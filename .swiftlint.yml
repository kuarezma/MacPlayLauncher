disabled_rules:
  - trailing_comma
opt_in_rules:
  - empty_count
  - force_unwrapping
  - sorted_imports
line_length:
  warning: 120
  error: 140
type_body_length:
  warning: 300
  error: 500
file_length:
  warning: 500
  error: 800
identifier_name:
  min_length:
    warning: 2
excluded:
  - MacPlayLauncher.xcodeproj
  - DerivedData
  - build
  - .build
  - build_output

